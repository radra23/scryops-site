{{ define "main" }}
<section class="tags-section">
  <div class="section-head">
    <span class="section-label">{{ .Title }}</span>
    <div class="section-rule"></div>
  </div>
  <div class="tag-cloud">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="tag-pill">{{ .Title }} ({{ len .Pages }})</a>
    {{ end }}
  </div>
</section>
{{ end }}
